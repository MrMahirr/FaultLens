# Example Nginx configuration for FaultLens (Debian/Ubuntu)
# To use: 
# 1. sudo cp deploy/nginx.conf /etc/nginx/sites-available/faultlens
# 2. sudo ln -s /etc/nginx/sites-available/faultlens /etc/nginx/sites-enabled/
# 3. sudo certbot --nginx -d app.sirketiniz.com
# 4. sudo systemctl restart nginx

server {
    listen 80;
    server_name app.faultlens.com; # Canlı domaininizi yazın

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Backend API routing
    location /api/v1/ {
        proxy_pass http://127.0.0.1:3600/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend WebSocket routing
    location /ws {
        proxy_pass http://127.0.0.1:3600/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend Next.js routing (Default)
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
