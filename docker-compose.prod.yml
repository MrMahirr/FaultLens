version: '3.9'
services:
  backend:
    build:
      context: ./faultlens-backend
      dockerfile: Dockerfile
    image: faultlens-backend:latest
    container_name: faultlens-backend-prod
    restart: always
    ports:
      - "${BACKEND_PORT:-3600}:3600"
    environment:
      # Database connection should point to managed DB
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-faultlens}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      # Redis connection should point to managed Redis
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      # Kafka connection should point to managed Kafka
      - KAFKA_SERVERS=${KAFKA_SERVERS}
      # Security & CORS
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3100}
      - AI_ENABLED=${AI_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3600/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./faultlens-frontend
      dockerfile: Dockerfile
    image: faultlens-frontend:latest
    container_name: faultlens-frontend-prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-3100}:3100"
    environment:
      # These must be provided during build or runtime
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.faultlens.com/api/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://api.faultlens.com/ws}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
