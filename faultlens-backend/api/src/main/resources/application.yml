spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: faultlens-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:faultlens}
    username: ${DB_USER:faultlens}
    password: ${DB_PASS:faultlens}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.jdbc.batch_size: 100
      hibernate.order_inserts: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: faultlens-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.faultlens.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:3600}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

faultlens:
  jwt:
    secret: ${JWT_SECRET:faultlens-secret-change-in-production-needs-256-bits-minimum}
    expiration-ms: 86400000
  collector:
    k8s:
      reconnect-interval-seconds: 30
    ssh:
      connect-timeout-ms: 5000
      retry-interval-seconds: 10
  analyzer:
    ai:
      enabled: ${AI_ENABLED:false}
      openai-api-key: ${OPENAI_API_KEY:}
      model: gpt-4o-mini
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    org.apache.tomcat.util.http.parser.Cookie: WARN
