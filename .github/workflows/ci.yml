name: FaultLens CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-build-and-test:
    name: Build & Test Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn -B package --file faultlens-backend/pom.xml

  frontend-build:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: faultlens-frontend/package-lock.json

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install Dependencies
      working-directory: ./faultlens-frontend
      run: pnpm install --frozen-lockfile

    - name: Build Next.js App
      working-directory: ./faultlens-frontend
      run: pnpm build
      env:
        # Dummy values for build phase
        NEXT_PUBLIC_API_URL: http://localhost:3600/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:3600/ws
